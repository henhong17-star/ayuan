                name: '招牌红烧肉',
                detail: '2500 g',

            };

            console.log('测试记录:', testRecord);
            document.getElementById('output').innerHTML = `
                <h3>记录详情：</h3>
                <p>菜品：${testRecord.name}</p>
                <p>重量：${testRecord.detail}</p>
                <p>时间：${testRecord.time}</p>
                <p>图片：${testRecord.image ? '有' : '无'}</p>
                ${testRecord.image ? `<img src="${testRecord.image}" style="width: 100px; height: 100px; border: 1px solid #ccc;">` : ''}
            `;
        }

        function testDisplay() {
            // 检查 localStorage
            const records = JSON.parse(localStorage.getItem('food_truck_records') || '[]');
            console.log('localStorage 中的记录数:', records.length);
            console.log('记录详情:', records);

            if (records.length === 0) {
                document.getElementById('output').innerHTML = '<p>localStorage 中没有记录</p>';
                return;
            }

            const html = records.map(rec => `
                <div style="border: 1px solid #ccc; padding: 10px; margin: 10px 0;">
                    <p><strong>${rec.name}</strong> - ${rec.detail}</p>
                    <p>时间: ${rec.time}</p>
                    <p>类型: ${rec.type}</p>
                    <p>图片: ${rec.image ? '✓ 有' : '✗ 无'}</p>
                    ${rec.image ? `<img src="${rec.image}" style="width: 80px; height: 80px; object-fit: cover; border: 1px solid #ddd;">` : ''}
                </div>
            `).join('');

            document.getElementById('output').innerHTML = html;
        }
    </script>
</body>

</html>
